name: Build production images

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v1

      - name: Build images
        working-directory: deploy
        run: |
          docker compose --progress plain build --build-arg CREATED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          docker image ls

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push images to GHCR
        env:
          TARGET_IMAGE: ghcr.io/${{ github.repository }}
        run: |
          image_lower="${TARGET_IMAGE,,}"
          repo_lower="${GITHUB_REPOSITORY,,}"

          for tag in $(docker image ls openintegrationengine/engine --format '{{.Tag}}' | grep -v '<none>'); do
            docker tag openintegrationengine/engine:$tag $image_lower:$tag
            docker push $image_lower:$tag
          done
